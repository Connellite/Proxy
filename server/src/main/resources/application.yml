server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: proxy
  datasource:
    url: jdbc:sqlite:${proxy.data-dir:./data}/proxy.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA foreign_keys=ON
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: @sqlite.dialect@
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  thymeleaf:
    cache: false

proxy:
  data-dir: ./data
  bootstrap:
    admin-username: admin
    admin-password: admin
  http:
    enabled: true
    bind-host: 0.0.0.0
    port: 3128
  https:
    enabled: false
    bind-host: 0.0.0.0
    port: 3129
  tls:
    # Optional bootstrap defaults; configure certificates in the Encryption UI.
    server-name:
    certificate-path:
    private-key-path:
  socks5:
    enabled: true
    bind-host: 0.0.0.0
    port: 1080
  http-auth-required: false
  socks-auth-required: false
  socks-udp-enabled: false
  connect-timeout-ms: 15000
  idle-timeout-seconds: 300
  http-max-content-length-bytes: 8388608
  # IANA timezone for UI dates / expire-on (examples: UTC, America/New_York)
  # timezone: UTC

logging:
  level:
    root: INFO
    io.github.connellite.proxy: INFO
