<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Encryption')}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main class="container">
    <div th:replace="~{layout :: flashes}"></div>
    <div class="row-between">
        <h1>Encryption settings</h1>
        <p class="muted" style="margin:0;">
            HTTPS:
            <span th:text="${httpsRunning} ? 'running' : 'stopped'">stopped</span>
        </p>
    </div>
    <div th:if="${lastError}" class="flash err" th:text="${lastError}"></div>

    <form class="panel form" th:action="@{/settings/encryption}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{privateKeySaved}"/>

        <label class="checkbox"><input type="checkbox" th:field="*{httpsEnabled}"/> Enable HTTPS proxy encryption</label>
        <div class="two-col">
            <label>HTTPS bind host
                <input type="text" th:field="*{httpsBindHost}" required/>
            </label>
            <label>HTTPS port
                <input type="number" th:field="*{httpsPort}" min="1" max="65535" required/>
            </label>
        </div>

        <label>Server name
            <input type="text" th:field="*{serverName}" maxlength="255"
                   placeholder="proxy.example.com"/>
            <span class="field-hint">Must match a DNS name or IP in the certificate.</span>
        </label>

        <label>Certificates
            <textarea th:field="*{certificateChain}" rows="10"
                      placeholder="-----BEGIN CERTIFICATE-----&#10;...&#10;-----END CERTIFICATE-----"></textarea>
            <span class="field-hint">Paste the PEM certificate chain (for example Let’s Encrypt fullchain.pem). Do not set both paste and path.</span>
        </label>
        <label>Certificate path
            <input type="text" th:field="*{certificatePath}" maxlength="1024"
                   placeholder="/etc/letsencrypt/live/proxy.example.com/fullchain.pem"/>
            <span class="field-hint">Or path to a PEM certificate chain file on this server.</span>
        </label>

        <label>Private key
            <textarea th:field="*{privateKey}" rows="8"
                      th:placeholder="${form.privateKeySaved} ? 'Private key is saved. Leave empty to keep it, or paste a new key.' : '-----BEGIN PRIVATE KEY-----'"></textarea>
            <span class="field-hint" th:if="${form.privateKeySaved}">A private key is already saved and will not be shown again.</span>
            <span class="field-hint">Paste the PEM private key. Do not set both paste and path.</span>
        </label>
        <label>Private key path
            <input type="text" th:field="*{privateKeyPath}" maxlength="1024"
                   placeholder="/etc/letsencrypt/live/proxy.example.com/privkey.pem"/>
            <span class="field-hint">Or path to a PEM private key file on this server.</span>
        </label>

        <div class="tls-status" th:if="${tlsStatus != null and (tlsStatus.validCert or tlsStatus.validKey or tlsStatus.warningValidation != null)}">
            <h3>Certificate status</h3>
            <ul class="tls-flags">
                <li th:classappend="${tlsStatus.validCert} ? 'ok' : 'bad'">
                    Certificate: <span th:text="${tlsStatus.validCert} ? 'valid' : 'invalid'">invalid</span>
                </li>
                <li th:classappend="${tlsStatus.validKey} ? 'ok' : 'bad'">
                    Private key: <span th:text="${tlsStatus.validKey} ? 'valid' : 'invalid'">invalid</span>
                    <span th:if="${tlsStatus.keyType}" th:text="' (' + ${tlsStatus.keyType} + ')'"></span>
                </li>
                <li th:classappend="${tlsStatus.validPair} ? 'ok' : 'bad'">
                    Pair: <span th:text="${tlsStatus.validPair} ? 'valid' : 'invalid'">invalid</span>
                </li>
                <li th:classappend="${tlsStatus.validChain} ? 'ok' : 'warn'">
                    Chain (system trust): <span th:text="${tlsStatus.validChain} ? 'trusted' : 'not trusted'">not trusted</span>
                </li>
            </ul>
            <p class="muted" th:if="${tlsStatus.subject}">
                Subject: <code th:text="${tlsStatus.subject}">CN=...</code>
            </p>
            <p class="muted" th:if="${tlsStatus.issuer}">
                Issuer: <code th:text="${tlsStatus.issuer}">CN=...</code>
            </p>
            <p class="muted" th:if="${tlsStatus.notBefore != null and tlsStatus.notAfter != null}">
                Validity:
                <span th:text="${tlsStatus.notBefore}">...</span>
                →
                <span th:text="${tlsStatus.notAfter}">...</span>
            </p>
            <p class="muted" th:if="${tlsStatus.dnsNames != null and !tlsStatus.dnsNames.isEmpty()}">
                Names:
                <span th:each="name, iter : ${tlsStatus.dnsNames}">
                    <code th:text="${name}">name</code><span th:unless="${iter.last}">, </span>
                </span>
            </p>
            <div class="flash warn" th:if="${tlsStatus.warningValidation}" th:text="${tlsStatus.warningValidation}"></div>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary">Save settings</button>
            <a class="button" th:href="@{/settings}">Back to settings</a>
        </div>
    </form>
</main>
</body>
</html>
