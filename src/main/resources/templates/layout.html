<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — Proxy Admin'">Proxy Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:fragment="header" class="topbar">
    <div class="brand"><a th:href="@{/}">Proxy Admin</a></div>
    <nav>
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/users}">Users</a>
        <a th:href="@{/settings}">Settings</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="logout" sec:authorize="isAuthenticated()">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Logout</button>
    </form>
</header>
<div th:fragment="flashes">
    <div th:if="${success}" class="flash ok" th:text="${success}"></div>
    <div th:if="${error}" class="flash err" th:text="${error}"></div>
</div>
<label th:fragment="refreshControl" class="refresh-control">
    Auto-refresh
    <select id="ui-refresh" aria-label="Auto-refresh interval">
        <option value="0">Off</option>
        <option value="1">1s</option>
        <option value="2">2s</option>
        <option value="3">3s</option>
        <option value="5">5s</option>
        <option value="10">10s</option>
        <option value="30">30s</option>
    </select>
</label>
<script th:fragment="refreshScript" th:src="@{/js/ui-refresh.js}"></script>
</body>
</html>
